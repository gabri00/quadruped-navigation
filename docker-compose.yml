# ==============================================================================
#  docker-compose.yml — ROS Jazzy Desktop Multi-OS
# ==============================================================================

services:
  quadruped_navigation:
    build:
      context: .
      dockerfile: Dockerfile

    # linux/amd64  → Linux / Windows (Intel/AMD)
    # linux/arm64  → Mac Apple Silicon (M1/M2/M3)
    platform: linux/amd64
    image: quadruped_image_jazzy
    container_name: quadruped_navigation

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - .:/home/ubuntu/quadruped-navigation:rw
      - ${XAUTHORITY:-~/.Xauthority}:/home/ubuntu/.Xauthority:ro

    network_mode: host
    tty: true